<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #outer{
            width:200px;
            height:200px;
            background-color:blue;
            position: relative;
            left:100px;
        }
        #inner{
            width:100px;
            height:100px;
            border-radius:50%;
            background-color: yellow;
            position:sticky;
            top:50px;
            left:50px;
        }
    </style>
</head>
<body>
    <div id="outer">
        <div id="inner"></div>
    </div>
</body>
</html>
